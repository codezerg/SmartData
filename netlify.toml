[build]
  base    = "site"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/nuget/*/*.nupkg"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/nuget/*/*.nuspec"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/nuget/*.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"
